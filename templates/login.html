<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng nhập ANFIS Web</title>
  <style>
    body { font-family: Arial, sans-serif; background: #eff6ff; margin: 0; }
    .box { max-width: 380px; margin: 80px auto; background: #fff; border: 1px solid #dbeafe; border-radius: 10px; padding: 20px; }
    h2 { margin-top: 0; color: #1e3a8a; }
    label { display: block; margin-top: 10px; margin-bottom: 4px; font-size: 14px; }
    input, button { width: 100%; box-sizing: border-box; padding: 8px; border-radius: 6px; border: 1px solid #cbd5e1; }
    button { margin-top: 14px; background: #2563eb; color: #fff; border: none; cursor: pointer; }
    .note { margin-top: 12px; font-size: 12px; color: #4b5563; }
    .flash { padding: 8px; border-radius: 6px; margin-bottom: 10px; }
    .flash.error { background: #fee2e2; color: #991b1b; }
    .flash.success { background: #dcfce7; color: #166534; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Đăng nhập</h2>
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
        <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="post">
      <label>Tên đăng nhập</label>
      <input name="username" required>
      <label>Mật khẩu</label>
      <input type="password" name="password" required>
      <button type="submit">Đăng nhập</button>
    </form>
    <div class="note">
      Tài khoản mặc định: admin/admin123, bacsi/doctor123.
    </div>
  </div>
</body>
</html>
